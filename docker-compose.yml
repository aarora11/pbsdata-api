x-app: &app
  build: .
  image: pbsdata-api:latest
  env_file: .env
  environment:
    DATABASE_URL: postgresql://pbsapi:pbsapi@postgres:5432/pbsapi
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pbsapi
      POSTGRES_PASSWORD: pbsapi
      POSTGRES_DB: pbsapi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pbsapi"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    <<: *app
    command: python scripts/migrate.py
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    <<: *app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # Run manually: docker compose run --rm ingest
  # With a specific month: docker compose run --rm ingest 2026-04
  ingest:
    <<: *app
    entrypoint: ["python", "scripts/run_ingest.py"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles:
      - ingest

volumes:
  pgdata:
